name: Deploy Web

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "apps/api/src/**"
      - "packages/tsconfig/**"
      - "bun.lock"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile

      - run: bun run lint --filter=@fonts/web
      - run: bun run typecheck --filter=@fonts/web
      - run: bun run test --filter=@fonts/web

      - name: Build
        working-directory: apps/web
        run: bun run build
        env:
          API_BASE: ${{ secrets.WEB_API_BASE }}
          PUBLIC_API_BASE: ${{ secrets.WEB_PUBLIC_API_BASE }}

      - name: Deploy to Cloudflare
        working-directory: apps/web
        run: bunx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
